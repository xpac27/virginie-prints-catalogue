---
layout: default
title: Virginie Prints
---

<div class="controls">
  <label for="sort-select">Sort by</label>
  <select id="sort-select">
    <option value="price">Price</option>
    <option value="size">Size</option>
    <option value="name">Name</option>
  </select>
</div>

{% assign products = site.products %}
<section class="listing-grid">
  {% for item in products %}
    <article
      class="card"
      data-name="{{ item.title | escape }}"
      data-size="{{ item.size | escape }}"
      data-price="{{ item.price | escape }}"
    >
      <figure>
        <img
          src="{{ item.image_path | relative_url }}"
          alt="{{ item.title | escape }}"
          loading="lazy"
          onerror="this.onerror=null;this.src='data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"800\" height=\"800\" viewBox=\"0 0 800 800\"><rect width=\"800\" height=\"800\" fill=\"%23efe7d6\"/><text x=\"50%\" y=\"50%\" text-anchor=\"middle\" dominant-baseline=\"middle\" font-family=\"Space Grotesk, Trebuchet MS, sans-serif\" font-size=\"32\" fill=\"%236b6252\">Image unavailable</text></svg>'"
        />
      </figure>
      <div class="content">
        <h2>{{ item.title }}</h2>
        <div class="meta">{{ item.size }} · {{ item.techniques }}</div>
        <div class="price">{{ item.price }} SEK</div>
        {% if item.featured %}
          <div class="star">Featured</div>
        {% endif %}
      </div>
    </article>
  {% endfor %}
</section>

<script>
  (function () {
    var select = document.getElementById("sort-select");
    var grid = document.querySelector(".listing-grid");
    if (!select || !grid) {
      return;
    }

    function parsePrice(value) {
      var parsed = parseFloat(String(value || "").replace(",", "."));
      return Number.isNaN(parsed) ? null : parsed;
    }

    function sortCards(key) {
      var cards = Array.prototype.slice.call(grid.querySelectorAll(".card"));
      cards.sort(function (a, b) {
        if (key === "price") {
          var priceA = parsePrice(a.dataset.price);
          var priceB = parsePrice(b.dataset.price);
          if (priceA === null && priceB === null) return 0;
          if (priceA === null) return 1;
          if (priceB === null) return -1;
          return priceA - priceB;
        }

        var valueA = a.dataset[key] || "";
        var valueB = b.dataset[key] || "";
        return valueA.localeCompare(valueB, undefined, { numeric: true, sensitivity: "base" });
      });

      cards.forEach(function (card) {
        grid.appendChild(card);
      });
    }

    select.addEventListener("change", function () {
      sortCards(select.value);
    });

    select.value = "price";
    sortCards("price");
  })();
</script>
